<!-- ============================================
   FILE: login.html
   PATH: public/login.html
   VERSION: 2.0.0
   DESCRIPTION: HALQ standalone login page — DashboardKit purple overlay, centered card, JWT cookie auth.
   ============================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HALQ — Sign In</title>
  <link rel="icon" href="/assets/dashboardkit/images/favicon.svg" type="image/x-icon">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- DashboardKit Icons -->
  <link rel="stylesheet" href="/assets/dashboardkit/fonts/feather.css">
  <link rel="stylesheet" href="/assets/dashboardkit/fonts/tabler-icons.min.css">

  <!-- DashboardKit CSS -->
  <link rel="stylesheet" href="/assets/dashboardkit/css/plugins/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/dashboardkit/css/style.css" id="main-style-link">

  <!-- Purple Theme Override -->
  <style>
    :root {
      --purple-primary: #6b5ce7;
      --purple-primary-dark: #5a4ed0;
      --purple-primary-light: #8a7cf0;
      --purple-gradient: linear-gradient(135deg, #6b5ce7 0%, #8a7cf0 100%);
      --purple-bg: #f5f6fa;
      --purple-card: #ffffff;
      --purple-text: #1a1a2e;
      --purple-text-muted: #6b7280;
      --purple-border: #e5e7eb;
      --purple-input-bg: #f9fafb;
      --purple-error: #ef4444;
      --purple-success: #22c55e;
    }

    * { box-sizing: border-box; }

    body, html {
      margin: 0; padding: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--purple-bg);
    }

    /* Animated purple background overlay */
    .login-bg {
      position: fixed;
      inset: 0;
      background: var(--purple-gradient);
      opacity: 0.92;
      z-index: 0;
    }

    /* Subtle pattern dots */
    .login-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* Decorative circles */
    .login-bg::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      top: -200px; right: -200px;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--purple-card);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(107, 92, 231, 0.25), 0 0 0 1px rgba(255,255,255,0.1);
      padding: 48px 40px;
      margin: 20px;
      animation: loginSlideIn 0.5s ease-out;
    }

    @keyframes loginSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand-icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--purple-gradient);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(107, 92, 231, 0.3);
    }

    .login-brand-icon svg {
      width: 32px; height: 32px;
      color: #fff;
    }

    .login-brand-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--purple-text);
      margin: 0 0 4px 0;
      letter-spacing: -0.5px;
    }

    .login-brand-sub {
      font-size: 13px;
      color: var(--purple-text-muted);
      margin: 0;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .login-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--purple-text);
    }

    .login-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .login-input-icon {
      position: absolute;
      left: 14px;
      color: var(--purple-text-muted);
      font-size: 16px;
      pointer-events: none;
      z-index: 2;
    }

    .login-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--purple-border);
      border-radius: 12px;
      background: var(--purple-input-bg);
      color: var(--purple-text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
    }

    .login-input:focus {
      border-color: var(--purple-primary);
      box-shadow: 0 0 0 4px rgba(107, 92, 231, 0.1);
      background: #fff;
    }

    .login-input::placeholder {
      color: #9ca3af;
    }

    .login-input.is-error {
      border-color: var(--purple-error);
    }

    .login-input.is-error:focus {
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    .login-error-msg {
      font-size: 12px;
      color: var(--purple-error);
      margin-top: 2px;
      min-height: 18px;
    }

    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }

    .login-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--purple-text-muted);
      user-select: none;
    }

    .login-remember input[type="checkbox"] {
      width: 18px; height: 18px;
      border: 1.5px solid var(--purple-border);
      border-radius: 5px;
      accent-color: var(--purple-primary);
      cursor: pointer;
    }

    .login-forgot {
      font-size: 13px;
      color: var(--purple-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .login-forgot:hover {
      color: var(--purple-primary-dark);
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: var(--purple-gradient);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(107, 92, 231, 0.35);
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(107, 92, 231, 0.45);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .login-btn.loading .login-btn-spinner {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--purple-border);
    }

    .login-footer-text {
      font-size: 12px;
      color: var(--purple-text-muted);
      margin: 0;
    }

    .login-footer-text a {
      color: var(--purple-primary);
      text-decoration: none;
      font-weight: 500;
    }

    /* Toast notification */
    .login-toast {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transform: translateX(120%);
      transition: transform 0.3s ease;
      max-width: 320px;
    }

    .login-toast.show {
      transform: translateX(0);
    }

    .login-toast.error { background: var(--purple-error); }
    .login-toast.success { background: var(--purple-success); }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        margin: 12px;
        border-radius: 16px;
      }
      .login-brand-icon { width: 56px; height: 56px; }
      .login-brand-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-bg"></div>

    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <h1 class="login-brand-title">Welcome to HALQ</h1>
        <p class="login-brand-sub">Housing & Asset Logistics Queue</p>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div class="login-field">
          <label class="login-label" for="username">Username</label>
          <div class="login-input-wrap">
            <i class="login-input-icon ti ti-user"></i>
            <input type="text" id="username" class="login-input" placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="login-error-msg" id="username-error"></div>
        </div>

        <div class="login-field">
          <label class="login-label" for="password">Password</label>
          <div class="login-input-wrap">
            <i class="login-input-icon ti ti-lock"></i>
            <input type="password" id="password" class="login-input" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <div class="login-error-msg" id="password-error"></div>
        </div>

        <div class="login-options">
          <label class="login-remember">
            <input type="checkbox" id="remember-me" checked>
            Remember me
          </label>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <span class="login-btn-spinner"></span>
          <span class="login-btn-text">Sign In</span>
        </button>
      </form>

      <!-- Setup form (hidden by default) -->
      <form class="login-form" id="setup-form" style="display:none" novalidate>
        <div class="login-field">
          <label class="login-label" for="setup-username">Choose Username</label>
          <div class="login-input-wrap">
            <i class="login-input-icon ti ti-user"></i>
            <input type="text" id="setup-username" class="login-input" placeholder="Pick a username" autocomplete="username" required>
          </div>
          <div class="login-error-msg" id="setup-username-error"></div>
        </div>

        <div class="login-field">
          <label class="login-label" for="setup-password">Choose Password</label>
          <div class="login-input-wrap">
            <i class="login-input-icon ti ti-lock"></i>
            <input type="password" id="setup-password" class="login-input" placeholder="Min 6 characters" autocomplete="new-password" required>
          </div>
          <div class="login-error-msg" id="setup-password-error"></div>
        </div>

        <div class="login-field">
          <label class="login-label" for="setup-confirm">Confirm Password</label>
          <div class="login-input-wrap">
            <i class="login-input-icon ti ti-check"></i>
            <input type="password" id="setup-confirm" class="login-input" placeholder="Repeat password" autocomplete="new-password" required>
          </div>
          <div class="login-error-msg" id="setup-confirm-error"></div>
        </div>

        <button type="submit" class="login-btn" id="setup-btn">
          <span class="login-btn-spinner"></span>
          <span class="login-btn-text">Create Account</span>
        </button>

        <div style="text-align:center;margin-top:12px">
          <a href="javascript:void(0)" id="link-back-to-login" style="color:var(--purple-primary);font-size:13px;text-decoration:none;font-weight:500">Back to Sign In</a>
        </div>
      </form>

      <div class="login-footer" id="login-footer">
        <p class="login-footer-text">Protected access. <a href="javascript:void(0)" id="link-setup">First time? Create account</a></p>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="login-toast" id="login-toast"></div>

  <script>
    (function() {
      const $ = id => document.getElementById(id);
      const form = $('login-form');
      const setupForm = $('setup-form');
      const btn = $('login-btn');
      const setupBtn = $('setup-btn');
      const toast = $('login-toast');
      const usernameEl = $('username');
      const passwordEl = $('password');
      const usernameErr = $('username-error');
      const passwordErr = $('password-error');

      // Check if already logged in
      (async function checkAuth() {
        try {
          const res = await fetch('/api/auth?action=me');
          const data = await res.json();
          if (data.ok && data.data?.authenticated) {
            window.location.href = '/';
          }
        } catch (e) {}
      })();

      // Toggle between login and setup
      $('link-setup').addEventListener('click', () => {
        form.style.display = 'none';
        setupForm.style.display = 'flex';
        $('login-footer').style.display = 'none';
      });
      $('link-back-to-login').addEventListener('click', () => {
        setupForm.style.display = 'none';
        form.style.display = 'flex';
        $('login-footer').style.display = 'block';
      });

      function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'login-toast ' + type;
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => toast.classList.remove('show'), 4000);
      }

      function setLoading(loading) {
        btn.disabled = loading;
        btn.classList.toggle('loading', loading);
        btn.querySelector('.login-btn-text').textContent = loading ? 'Signing in...' : 'Sign In';
      }

      function setSetupLoading(loading) {
        setupBtn.disabled = loading;
        setupBtn.classList.toggle('loading', loading);
        setupBtn.querySelector('.login-btn-text').textContent = loading ? 'Creating...' : 'Create Account';
      }

      function clearErrors() {
        usernameEl.classList.remove('is-error');
        passwordEl.classList.remove('is-error');
        usernameErr.textContent = '';
        passwordErr.textContent = '';
      }

      function clearSetupErrors() {
        $('setup-username').classList.remove('is-error');
        $('setup-password').classList.remove('is-error');
        $('setup-confirm').classList.remove('is-error');
        $('setup-username-error').textContent = '';
        $('setup-password-error').textContent = '';
        $('setup-confirm-error').textContent = '';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearErrors();

        const username = usernameEl.value.trim();
        const password = passwordEl.value;
        const remember = $('remember-me').checked;
        let hasError = false;

        if (!username) {
          usernameEl.classList.add('is-error');
          usernameErr.textContent = 'Username is required';
          hasError = true;
        }
        if (!password) {
          passwordEl.classList.add('is-error');
          passwordErr.textContent = 'Password is required';
          hasError = true;
        }
        if (hasError) return;

        setLoading(true);

        try {
          const res = await fetch('/api/auth?action=login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, remember })
          });
          const data = await res.json();

          if (data.ok && data.data?.token) {
            showToast('Welcome back! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/', 600);
          } else {
            showToast(data.error || 'Invalid credentials', 'error');
            passwordEl.classList.add('is-error');
            passwordEl.value = '';
            passwordEl.focus();
          }
        } catch (err) {
          showToast('Network error. Please try again.', 'error');
        } finally {
          setLoading(false);
        }
      });

      // Setup form
      setupForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearSetupErrors();

        const username = $('setup-username').value.trim();
        const password = $('setup-password').value;
        const confirm = $('setup-confirm').value;
        let hasError = false;

        if (!username) {
          $('setup-username').classList.add('is-error');
          $('setup-username-error').textContent = 'Username is required';
          hasError = true;
        }
        if (!password || password.length < 6) {
          $('setup-password').classList.add('is-error');
          $('setup-password-error').textContent = 'Password must be at least 6 characters';
          hasError = true;
        }
        if (password !== confirm) {
          $('setup-confirm').classList.add('is-error');
          $('setup-confirm-error').textContent = 'Passwords do not match';
          hasError = true;
        }
        if (hasError) return;

        setSetupLoading(true);

        try {
          const res = await fetch('/api/auth?action=setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();

          if (data.ok) {
            showToast('Account created! Please sign in.', 'success');
            setupForm.style.display = 'none';
            form.style.display = 'flex';
            $('login-footer').style.display = 'block';
            usernameEl.value = username;
            passwordEl.focus();
          } else if (data.error === 'User already exists. Use login.') {
            showToast('Account already exists. Please sign in.', 'error');
            setupForm.style.display = 'none';
            form.style.display = 'flex';
            $('login-footer').style.display = 'block';
          } else {
            showToast(data.error || 'Setup failed', 'error');
          }
        } catch (err) {
          showToast('Network error. Please try again.', 'error');
        } finally {
          setSetupLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
