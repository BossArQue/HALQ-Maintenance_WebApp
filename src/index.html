<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HALQ</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/wo-panel.css">
  <link rel="stylesheet" href="css/af-panel.css">
  <link rel="stylesheet" href="css/email-panel.css">
  <link rel="stylesheet" href="css/notes-panel.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/context-menu.css">
  <link rel="stylesheet" href="css/category-manager.css">
</head>
<body data-theme="dark">

  <!-- ========== TITLE BAR ========== -->
  <header id="titleBar">
    <div class="title-left">
      <span class="app-logo">◆</span>
      <span class="app-name">HALQ</span>
      <span id="clock" class="clock">--:--</span>
    </div>
    <div class="title-center" id="profileInfo">—</div>
    <div class="title-right">
      <button id="btnSettings" title="Settings">⚙</button>
      <button id="btnMinimize" title="Minimize">—</button>
      <button id="btnMaximize" title="Maximize">□</button>
      <button id="btnClose" title="Close">✕</button>
    </div>
  </header>

  <!-- ========== ROOT LAYOUT ========== -->
  <div id="appLayout" class="layout-standard">

    <!-- Sidebar -->
    <nav id="sideBar">
      <button class="nav-btn active" data-view="wo" title="Work Orders">WO</button>
      <button class="nav-btn" data-view="af" title="AppFolio">AF</button>
      <button class="nav-btn" data-view="email" title="Email">✉</button>
      <button class="nav-btn" data-view="notes" title="Notes">📝</button>
    </nav>

    <!-- Main -->
    <main id="mainArea">

      <!-- Section tabs (WO sub-views if needed) -->
      <div id="sectionTabs" class="hidden">
        <button class="sec-tab active" data-sec="active">Active</button>
        <button class="sec-tab" data-sec="pending">Pending</button>
        <button class="sec-tab" data-sec="closed">Closed</button>
      </div>

      <!-- View: WO -->
      <section id="view-wo" class="view-panel">
        <div class="wo-toolbar">
          <input type="search" id="woSearch" placeholder="Search WO #, address, vendor…">
          <div class="wo-filters" id="woFilters"></div>
          <button id="woFilterToggle" class="btn-icon" title="Filters">▼</button>
        </div>
        <div id="woList" class="wo-list"></div>
        <div id="woDetailDrawer" class="detail-drawer hidden">
          <div class="drawer-header">
            <h3 id="woDetailTitle">Work Order</h3>
            <button class="btn-close-drawer">✕</button>
          </div>
          <div class="drawer-body" id="woDetailBody"></div>
          <div class="drawer-footer">
            <button id="btnSaveWO" class="btn-primary">Save</button>
            <button id="btnFollowUp" class="btn-secondary">Follow-up ▾</button>
          </div>
        </div>
      </section>

      <!-- View: AppFolio -->
      <section id="view-af" class="view-panel hidden">
        <div class="af-toolbar">
          <button id="afBack">◀</button>
          <button id="afForward">▶</button>
          <button id="afReload">↻</button>
          <input type="text" id="afUrlBar" placeholder="https://…">
          <button id="afAddTab" class="btn-icon">+</button>
        </div>
        <div class="af-tabbar" id="afTabBar"></div>
        <div class="af-webview-host" id="afWebviewHost"></div>
      </section>

      <!-- View: Email -->
      <section id="view-email" class="view-panel hidden">
        <div class="em-toolbar">
          <button id="emBack">◀</button>
          <button id="emForward">▶</button>
          <button id="emReload">↻</button>
          <input type="text" id="emUrlBar" placeholder="https://outlook.office.com/…">
          <button id="emAddTab" class="btn-icon">+</button>
        </div>
        <div class="em-tabbar" id="emTabBar"></div>
        <div class="em-webview-host" id="emWebviewHost"></div>
      </section>

      <!-- View: Notes -->
      <section id="view-notes" class="view-panel hidden">
        <div class="notes-topbar">
          <button id="ntNewNotebook" class="btn-icon" title="New Notebook">📓+</button>
          <button id="ntNewSection" class="btn-icon" title="New Section">📑+</button>
          <button id="ntNewPage" class="btn-icon" title="New Page">📄+</button>
          <span class="spacer"></span>
          <button id="ntExport" class="btn-icon" title="Export">⬇</button>
          <button id="ntDeletePage" class="btn-icon" title="Delete Page">🗑</button>
        </div>
        <div class="notes-body">
          <aside id="ntTree" class="notes-tree"></aside>
          <aside id="ntPages" class="notes-pages"></aside>
          <div class="notes-editor">
            <div class="nt-toolbar">
              <button data-cmd="bold"><b>B</b></button>
              <button data-cmd="italic"><i>I</i></button>
              <button data-cmd="underline"><u>U</u></button>
              <button data-cmd="insertUnorderedList">• List</button>
              <button data-cmd="insertOrderedList">1. List</button>
              <button id="ntDrawToggle" class="btn-icon">✎</button>
            </div>
            <div id="ntPageArea" class="nt-page-area" contenteditable="true"></div>
            <canvas id="ntCanvas" class="nt-canvas hidden"></canvas>
          </div>
        </div>
      </section>

    </main>

    <!-- Bottom bar -->
    <footer id="bottomBar">
      <span id="statusText">Ready</span>
      <span id="woCount">0 WOs</span>
      <span id="version">v1.0</span>
    </footer>

  </div>

  <!-- ========== SETTINGS OVERLAY ========== -->
  <div id="settingsOverlay" class="overlay hidden">
    <div id="settingsPanel" class="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="btnCloseSettings" class="btn-icon">✕</button>
      </div>
      <div class="settings-tabs">
        <button class="settings-tab-btn active" data-tab="general">General</button>
        <button class="settings-tab-btn" data-tab="appearance">Appearance</button>
        <button class="settings-tab-btn" data-tab="security">Security</button>
        <button class="settings-tab-btn" data-tab="credentials">Credentials</button>
        <button class="settings-tab-btn" data-tab="messages">Messages</button>
        <button class="settings-tab-btn" data-tab="data">Data</button>
      </div>

      <!-- General -->
      <div id="tab-general" class="settings-tab-body">
        <div class="setting-row">
          <label>Excel Data Path</label>
          <div class="setting-input-row">
            <input type="text" id="inputExcelPath" readonly placeholder="No file selected">
            <button id="btnPickExcel">Browse…</button>
            <button id="btnClearExcel">Clear</button>
          </div>
        </div>
        <div class="setting-row">
          <button id="btnOpenCatManager" class="btn-secondary">Manage Categories</button>
        </div>
      </div>

      <!-- Appearance -->
      <div id="tab-appearance" class="settings-tab-body hidden">
        <div class="setting-row">
          <label>Theme</label>
          <div class="theme-grid">
            <label><input type="radio" name="theme" value="dark" checked><span>Dark</span></label>
            <label><input type="radio" name="theme" value="light"><span>Light</span></label>
            <label><input type="radio" name="theme" value="midnight"><span>Midnight</span></label>
          </div>
        </div>
        <div class="setting-row">
          <label>Layout Density</label>
          <div class="layout-options">
            <label><input type="radio" name="layout" value="compact"><span>Compact</span></label>
            <label><input type="radio" name="layout" value="standard" checked><span>Standard</span></label>
            <label><input type="radio" name="layout" value="comfortable"><span>Comfortable</span></label>
          </div>
        </div>
        <div class="setting-row">
          <label>Font</label>
          <select id="selFontFamily">
            <option value="system">System Default</option>
            <option value="inter">Inter</option>
            <option value="roboto">Roboto</option>
            <option value="mono">Monospace</option>
          </select>
        </div>
      </div>

      <!-- Security -->
      <div id="tab-security" class="settings-tab-body hidden">
        <div class="pin-panel">
          <div id="pinDisplay" class="pin-display">Enter PIN</div>
          <div class="pin-keys">
            <button class="pin-key" data-digit="1">1</button>
            <button class="pin-key" data-digit="2">2</button>
            <button class="pin-key" data-digit="3">3</button>
            <button class="pin-key" data-digit="4">4</button>
            <button class="pin-key" data-digit="5">5</button>
            <button class="pin-key" data-digit="6">6</button>
            <button class="pin-key" data-digit="7">7</button>
            <button class="pin-key" data-digit="8">8</button>
            <button class="pin-key" data-digit="9">9</button>
            <button class="pin-key" data-digit="back">⌫</button>
            <button class="pin-key" data-digit="0">0</button>
            <button class="pin-key" data-digit="clear">C</button>
          </div>
          <div class="pin-actions">
            <button id="btnPinSave" class="btn-primary">Save PIN</button>
            <button id="btnPinClear" class="btn-secondary">Remove PIN</button>
          </div>
          <p id="pinMsg" class="pin-msg"></p>
          <p id="pinStatus" class="pin-status"></p>
        </div>
      </div>

      <!-- Credentials -->
      <div id="tab-credentials" class="settings-tab-body hidden">
        <div class="setting-row">
          <label>AppFolio Username</label>
          <input type="text" id="inputUsername" autocomplete="off">
        </div>
        <div class="setting-row">
          <label>AppFolio Password</label>
          <input type="password" id="inputPassword" autocomplete="off">
        </div>
        <div class="setting-row">
          <button id="btnSaveCreds" class="btn-primary">Save Credentials</button>
        </div>
      </div>

      <!-- Messages -->
      <div id="tab-messages" class="settings-tab-body hidden">
        <div class="setting-row">
          <h4>Message Templates</h4>
          <div id="msgTemplateList" class="template-list"></div>
          <button id="btnAddTemplate" class="btn-secondary">+ Add Template</button>
          <button id="btnResetTemplates" class="btn-text">Reset to Defaults</button>
        </div>
        <div class="setting-row">
          <h4>Vendor Directory</h4>
          <div id="vendorDirTable" class="vendor-table-wrap"></div>
          <button id="btnAddVendor" class="btn-secondary">+ Add Vendor</button>
          <button id="btnImportVendors" class="btn-text">Import JSON…</button>
          <button id="btnExportVendors" class="btn-text">Export JSON</button>
          <div id="vendorImportArea" class="hidden">
            <textarea placeholder="Paste vendor JSON here…"></textarea>
            <button class="btn-primary">Import</button>
          </div>
        </div>
      </div>

      <!-- Data -->
      <div id="tab-data" class="settings-tab-body hidden">
        <div class="setting-row">
          <button id="btnExportAll" class="btn-secondary">Export All Data</button>
          <button id="btnImportAll" class="btn-secondary">Import Data</button>
          <button id="btnClearAll" class="btn-danger">Clear All Local Data</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MODALS ========== -->
  <div id="promptModal" class="modal hidden">
    <div class="modal-box">
      <h4 id="pmTitle">Prompt</h4>
      <input type="text" id="pmInput" class="modal-input">
      <div class="modal-actions">
        <button id="pmCancel" class="btn-secondary">Cancel</button>
        <button id="pmOk" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-box">
      <h4 id="cmTitle">Confirm</h4>
      <p id="cmBody">Are you sure?</p>
      <div class="modal-actions">
        <button id="cmCancel" class="btn-secondary">Cancel</button>
        <button id="cmOk" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <div id="exportModal" class="modal hidden">
    <div class="modal-box">
      <h4>Export Notes</h4>
      <div class="export-options">
        <label><input type="radio" name="exportFmt" value="html" checked> HTML</label>
        <label><input type="radio" name="exportFmt" value="md"> Markdown</label>
        <label><input type="radio" name="exportFmt" value="txt"> Plain Text</label>
      </div>
      <div class="modal-actions">
        <button id="exCancel" class="btn-secondary">Cancel</button>
        <button id="exOk" class="btn-primary">Export</button>
      </div>
    </div>
  </div>

  <!-- Category Manager Modal -->
  <div id="catManagerModal" class="modal hidden">
    <div class="modal-box modal-lg">
      <h4>Manage Categories</h4>
      <div id="catManagerBody"></div>
      <div class="modal-actions">
        <button id="cmClose" class="btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Error Dialog -->
  <div id="errorDialog" class="modal hidden">
    <div class="modal-box">
      <h4 id="errTitle">Error</h4>
      <p id="errBody">Something went wrong.</p>
      <div class="modal-actions">
        <button id="errOk" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- Debug Bar -->
  <div id="debugBar" class="debug-bar hidden"></div>

  <!-- Drop Overlay -->
  <div id="dropOverlay" class="drop-overlay hidden">
    <div class="drop-msg">Drop files here</div>
  </div>

  <!-- ========== CONTEXT MENU TEMPLATE ========== -->
  <template id="ctxMenuTpl">
    <div class="context-menu">
      <ul class="ctx-list"></ul>
    </div>
  </template>

  <!-- ========== SCRIPTS ========== -->
  <script src="js/app.js"></script>
  <script src="js/wo-panel.js"></script>
  <script src="js/af-panel.js"></script>
  <script src="js/email-panel.js"></script>
  <script src="js/notes-panel.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/settings.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      HALQ.app.init();
      HALQ.settings.init();
    });
  </script>
</body>
</html>
